name: Run Content Generator

on:
  schedule:
    - cron: '30 3 * * *'  # 9:00 AM IST (3:30 AM UTC)
  workflow_dispatch:

jobs:
  generate-content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Create service account key file
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > serviceAccountKey.json
      - name: Run content generator
        env:
          OPENROUTER_API: ${{ secrets.OPENROUTER_API }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          IMAGE_MODEL: ${{ secrets.IMAGE_MODEL }}
          CONTENT_MODEL: ${{ secrets.CONTENT_MODEL }}
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          POST_COUNT: ${{ secrets.POST_COUNT }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: |
          python run_bot.py
